<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />

  <title>Word Complet · El teclado AI inverso</title>

  <meta name="theme-color" content="#0A0A18" />
  <meta name="color-scheme" content="dark" />
  <meta name="description" content="Deja de teclear letra a letra. Pulsa las palabras que una IA predice para ti y transmite tu idea en segundos." />
  <link rel="manifest" href="./manifest.webmanifest" />

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="WordComplet" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon-180.png" />

  <!-- Open Graph -->
  <meta property="og:title" content="Word Complet — El teclado AI inverso" />
  <meta property="og:description" content="Tus ideas ya no van letra a letra. Pulsa palabras, no teclees. Tu idea en segundos." />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="es_ES" />

  <!-- Favicons -->
  <link rel="icon" type="image/svg+xml" href="./icons/icon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />

  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <main id="app" aria-label="Word Complet">

    <!-- Intro banner — first-time visitors see the "why", dismiss with one tap -->
    <aside id="intro" class="intro" role="note">
      <div class="intro-inner">
        <h1>Deja de teclear letra a letra.</h1>
        <p>
          La IA predice lo que quieres decir. Tú solo pulsas las palabras que encajan.
          <strong>Tu idea construida en segundos</strong>, no en minutos.
        </p>
        <button id="intro-close" type="button" aria-label="Cerrar introducción">Empezar</button>
      </div>
    </aside>

    <!-- Polished text area -->
    <section id="top" class="surface">
      <div id="scroll-text">
        <p id="polished" aria-live="polite" aria-atomic="true">Pulsa una palabra para empezar a escribir...</p>
        <p id="raw-words" aria-hidden="true"></p>
      </div>
    </section>

    <!-- Thin progress bar -->
    <div id="progress" class="hidden" aria-hidden="true"></div>

    <!-- Word chips -->
    <section id="chips" aria-label="Palabras sugeridas"></section>

    <!-- Action bar -->
    <nav id="actions" aria-label="Acciones">
      <button id="btn-undo" type="button" aria-label="Deshacer última palabra" title="Deshacer">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12.5 8C9.85 8 7.45 8.99 5.6 10.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z" fill="currentColor"/></svg>
        <span>Deshacer</span>
      </button>

      <button id="btn-clear" type="button" aria-label="Limpiar todo" title="Limpiar">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z" fill="currentColor"/></svg>
        <span>Limpiar</span>
      </button>

      <button id="btn-copy" type="button" aria-label="Copiar mensaje" title="Copiar">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z" fill="currentColor"/></svg>
        <span>Copiar</span>
      </button>

      <button id="btn-refresh" type="button" class="primary" aria-label="Regenerar palabras" title="Regenerar">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" fill="currentColor"/></svg>
        <span>Regenerar</span>
      </button>
    </nav>

    <!-- iOS install hint -->
    <div id="ios-hint" class="hidden" role="dialog" aria-labelledby="ios-hint-title">
      <p id="ios-hint-title">Instala Word Complet</p>
      <p>Toca <span class="mono">Compartir</span> y luego <span class="mono">Añadir a pantalla de inicio</span>.</p>
      <button id="ios-hint-close" type="button" aria-label="Cerrar aviso">Entendido</button>
    </div>

    <!-- Toast -->
    <div id="toast" class="hidden" role="status" aria-live="polite"></div>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
