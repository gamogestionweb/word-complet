<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12122A"/>
      <stop offset="1" stop-color="#0A0A18"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8A7BFF"/>
      <stop offset="1" stop-color="#6C5CE7"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- chip grid motif: small rounded rectangles suggesting words -->
  <g fill="#1A1A36" stroke="rgba(255,255,255,0.09)" stroke-width="1.2">
    <rect x="78"  y="108" width="110" height="36" rx="10"/>
    <rect x="200" y="108" width="86"  height="36" rx="10"/>
    <rect x="298" y="108" width="140" height="36" rx="10"/>

    <rect x="78"  y="158" width="70"  height="36" rx="10"/>
    <rect x="160" y="158" width="124" height="36" rx="10"/>
    <rect x="296" y="158" width="142" height="36" rx="10"/>

    <rect x="78"  y="208" width="140" height="36" rx="10"/>
    <rect x="230" y="208" width="96"  height="36" rx="10"/>
    <rect x="338" y="208" width="100" height="36" rx="10"/>
  </g>

  <!-- highlighted chip (accent) — the "chosen word" -->
  <rect x="160" y="158" width="124" height="36" rx="10" fill="url(#accent)"/>

  <!-- big letter W mark: strong brand, clear at 180px -->
  <g transform="translate(256,360)">
    <path d="M -132 -40 L -88 72 L -52 -18 L -16 72 L 28 -40
             L 60 -40 L 16 72 L -20 72 L -52 0 L -84 72 L -120 72 L -164 -40 Z"
          fill="url(#accent)"
          stroke="#8A7BFF" stroke-width="1" stroke-linejoin="round"/>
  </g>

  <!-- subtle glow around the W -->
  <g transform="translate(256,360)" opacity="0.22">
    <path d="M -132 -40 L -88 72 L -52 -18 L -16 72 L 28 -40
             L 60 -40 L 16 72 L -20 72 L -52 0 L -84 72 L -120 72 L -164 -40 Z"
          fill="none" stroke="#8A7BFF" stroke-width="8" stroke-linejoin="round"/>
  </g>
</svg>
